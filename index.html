<!DOCTYPE html>
<html>
<head>
  <title>Vanij — Retro Trading Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Pageclip CSS -->
  <link rel="stylesheet" href="https://s.pageclip.co/v1/pageclip.css" media="screen">

  <style>
    body {
      background: radial-gradient(circle at top, #020617, #000000);
      font-family: 'Courier New', monospace;
    }

    .terminal {
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(0,255,150,0.2);
      box-shadow: 0 0 30px rgba(0,255,150,0.1);
    }

    .glow {
      text-shadow: 0 0 8px rgba(0,255,150,0.8);
    }

    .input-glow:focus {
      box-shadow: 0 0 10px rgba(0,255,150,0.6);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center text-green-400 px-6">

  <div class="terminal rounded-2xl p-8 max-w-lg w-full">

    <!-- Header -->
    <div class="mb-6">
      <p class="text-sm text-green-500">[ VANij TERMINAL v0.1 ]</p>
      <h1 class="text-4xl font-bold glow mt-2">VANIJ</h1>
      <p class="text-green-500 text-sm mt-2">
        AI-powered trading infrastructure for modern markets
      </p>
    </div>

    <!-- Fake terminal logs -->
    <div class="text-xs text-green-600 mb-6 space-y-1">
      <p>> initializing market engine...</p>
      <p>> loading signals...</p>
      <p>> connecting to exchange...</p>
      <p class="text-green-400">> system ready</p>
    </div>

    <!-- Waitlist Form -->
    <form action="https://send.pageclip.co/YFOvAQUISkHuGVbssetJw09v9Yccubno"
          class="pageclip-form flex flex-col gap-4"
          method="post">

      <input 
        type="email" 
        name="email" 
        placeholder="enter_email@domain.com"
        required
        class="p-3 bg-black border border-green-500/30 rounded text-green-400 placeholder-green-600 input-glow focus:outline-none"
      />

      <input 
        type="text" 
        name="interest" 
        placeholder="interest (quant / infra / ai)"
        class="p-3 bg-black border border-green-500/30 rounded text-green-400 placeholder-green-600 input-glow focus:outline-none"
      />

      <button type="submit"
        class="pageclip-form__submit bg-green-500 text-black py-3 rounded font-bold hover:bg-green-400 transition">
        <span>JOIN WAITLIST</span>
      </button>

    </form>

    <!-- Footer -->
    <div class="mt-6 text-xs text-green-600">
      <p>> early access only</p>
      <p>> no spam</p>
    </div>

  </div>

  <!-- Pageclip JS -->
  <script src="https://s.pageclip.co/v1/pageclip.js" charset="utf-8"></script>

</body>
</html>
