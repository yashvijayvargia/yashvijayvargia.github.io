<!DOCTYPE html>
<html>
<head>
  <title>Vanij Waitlist</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Pageclip CSS -->
  <link rel="stylesheet" href="https://s.pageclip.co/v1/pageclip.css" media="screen">

  <style>
    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
    }

    .glass {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center text-white px-6">

  <div class="glass rounded-3xl p-10 max-w-lg w-full shadow-2xl">

    <!-- Heading -->
    <h1 class="text-4xl font-bold mb-3 tracking-tight">
      Vanij
    </h1>

    <p class="text-gray-300 mb-8">
      Join the waitlist for next-gen trading infrastructure & AI-powered systems.
    </p>

    <!-- Waitlist Form -->
    <form action="https://send.pageclip.co/YFOvAQUISkHuGVbssetJw09v9Yccubno/contact-form"
          class="pageclip-form flex flex-col gap-5"
          method="post">

      <input 
        type="email" 
        name="email" 
        placeholder="Enter your email"
        required
        class="p-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-white/30 placeholder-gray-400"
      />

      <input 
        type="text" 
        name="subject" 
        placeholder="What are you interested in?"
        class="p-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-white/30 placeholder-gray-400"
      />

      <button type="submit"
        class="pageclip-form__submit mt-2 bg-white text-black py-3 rounded-xl font-semibold hover:bg-gray-200 transition">
        <span>Join Waitlist</span>
      </button>

    </form>

    <!-- Footer note -->
    <p class="text-xs text-gray-400 mt-6 text-center">
      No spam. Early access only.
    </p>

  </div>

  <!-- Pageclip JS -->
  <script src="https://s.pageclip.co/v1/pageclip.js" charset="utf-8"></script>

</body>
</html>
