<!DOCTYPE html>
<html>
<head>
  <title>My Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Pageclip CSS -->
  <link rel="stylesheet" href="https://s.pageclip.co/v1/pageclip.css" media="screen">
</head>

<body class="bg-black text-white p-10">
  <h1 class="text-4xl font-bold">Yash's Tech Blog</h1>
  <p class="mt-4 text-gray-400">
    Real-time systems, trading infra, and AI engineering.
  </p>

  <!-- Contact Form -->
  <div class="mt-10 max-w-md">
    <h2 class="text-2xl font-semibold mb-4">Contact Me</h2>

    <form action="https://send.pageclip.co/YFOvAQUISkHuGVbssetJw09v9Yccubno"
          class="pageclip-form flex flex-col gap-4"
          method="post">

      <input 
        type="text" 
        name="name" 
        placeholder="Your Name"
        class="p-3 rounded bg-gray-800 border border-gray-700 text-white"
        required
      />

      <input 
        type="email" 
        name="email" 
        placeholder="Your Email"
        class="p-3 rounded bg-gray-800 border border-gray-700 text-white"
        required
      />

      <textarea 
        name="message" 
        placeholder="Your Message"
        rows="4"
        class="p-3 rounded bg-gray-800 border border-gray-700 text-white"
        required
      ></textarea>

      <button type="submit" class="pageclip-form__submit bg-white text-black py-2 rounded font-semibold">
        <span>Send</span>
      </button>

    </form>
  </div>

  <!-- Pageclip JS -->
  <script src="https://s.pageclip.co/v1/pageclip.js" charset="utf-8"></script>
</body>
</html>
